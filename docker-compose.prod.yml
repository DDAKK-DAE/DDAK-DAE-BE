# EC2 배포용 docker-compose
# 사용법: docker-compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    container_name: hackathon-db
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-server:
    build: ./ddak-dae-ai
    container_name: hackathon-ai
    env_file:
      - .env
    restart: unless-stopped

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: hackathon-app
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AI_SERVER_URL: http://ai-server:8000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
