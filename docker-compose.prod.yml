# EC2 배포용 docker-compose
# 사용법: docker-compose -f docker-compose.prod.yml up -d
#
# 필요한 환경변수는 EC2의 .env 파일에 정의하거나
# 직접 export 후 실행하세요.

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: hackathon-app
    env_file:
      - .env                    # EC2의 .env 파일에서 환경변수 주입
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
