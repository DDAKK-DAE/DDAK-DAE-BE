# CodeRabbit 설정
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: "ko-KR"

reviews:
  profile: "chill"
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/*.md"
    - "!**/generated/**"
    - "!**/.gradle/**"
    - "!**/build/**"

  instructions: |
    이 프로젝트는 1박 2일 해커톤용 Spring Boot 백엔드입니다.
    
    ## 리뷰 우선순위
    1. 기능 동작 여부 (발표 데모 기준)
    2. 데이터 정합성 (DB 트랜잭션 처리)
    3. 공통 응답 포맷 (`ApiResponse<T>`) 준수 여부
    4. 도메인 패키지 구조 준수 (controller 얇게, 비즈니스 로직은 service)
    
    ## 리뷰 제외 항목 (해커톤 특성상)
    - 테스트 커버리지 요구 금지
    - 마이크로 최적화 지적 금지
    - 과도한 추상화·확장성 제안 금지
    
    ## 절대 통과 금지 (BLOCKING)
    - 환경 변수 하드코딩 (API 키, 비밀번호 등)
    - DB 변경을 Flyway 마이그레이션 없이 직접 처리
    - 핵심 비즈니스 로직에서 트랜잭션(@Transactional) 누락
    
    ## 언어
    - 모든 리뷰 코멘트는 한국어로 작성

chat:
  auto_reply: true
