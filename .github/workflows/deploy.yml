name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build & Push Docker Image ───────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew bootJar --no-daemon -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to EC2 ───────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_CONTENT,GH_TOKEN,GH_ACTOR,GH_REPO
          script: |
            set -e

            # .env 파일 자동 생성 (특수문자 안전하게 처리)
            mkdir -p ~/hackathon
            printf '%s' "$ENV_CONTENT" > ~/hackathon/.env

            # GitHub Container Registry 로그인
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # 최신 이미지 Pull
            docker pull ghcr.io/${GH_REPO}:latest

            # 배포 디렉토리로 이동
            cd ~/hackathon

            # 최신 compose 파일 업데이트 (private 레포 대응 Authorization 헤더 포함)
            curl -sSL \
              -H "Authorization: token $GH_TOKEN" \
              https://raw.githubusercontent.com/${GH_REPO}/main/docker-compose.prod.yml \
              -o docker-compose.prod.yml

            # docker-compose 이미지 이름 변수
            export GITHUB_REPOSITORY="$GH_REPO"

            # 재시작
            docker-compose -f docker-compose.prod.yml down --remove-orphans
            docker-compose -f docker-compose.prod.yml up -d

            # 오래된 이미지 정리
            docker image prune -f

            echo "✅ Deploy completed: $(date)"
